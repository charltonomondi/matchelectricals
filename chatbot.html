<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <!---Google Fonts Link for icons-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"/>
    <script src="script.js" defer></script>
    <link href="assets/custom/css/match-enhancements.css" rel="stylesheet">
</head>
<body>
    <button class="chatbot-toggler">
        <span class="material-symbols-outlined">mode_comment</span>
        <span class="material-symbols-outlined">close</span>
    </button>
    <div class="chatbot">
        <header>
            <h2>Chatbot</h2>
            <span class="close-btn material-symbols-outlined">close</span>
        </header>
        <ul class="chatbox">
            <li class="chat incoming">
                <span class="material-symbols-outlined">smart_toy</span>
                <p>Hi there 👋<br>How can i help you today?</p>
            </li>  
            
        </ul>
        <div class="chat-input">
            <textarea placeholder="Enter a message..." required></textarea>
            <span id="send-btn" class="material-symbols-outlined">send</span>
        </div>
    </div>
<!-- Scroll to top -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="Scroll to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <i class="fas fa-chevron-up"></i>
</button>
<script>
(function(){
  var btn = document.getElementById("scrollTopBtn");
  var nav = document.querySelector(".fables-navigation");
  window.addEventListener("scroll", function(){
    if(window.scrollY > 300){ btn </body></body> btn.classList.add("visible"); }
    else { btn </body></body> btn.classList.remove("visible"); }
    if(window.scrollY > 60){ nav </body></body> nav.classList.add("scrolled"); }
    else { nav </body></body> nav.classList.remove("scrolled"); }
  });
})();
</script>
</body>
</html>
